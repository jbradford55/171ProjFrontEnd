<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MI Prediction Model</title>
  <!-- using bootstrap for styling -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css"
  >
  <!-- link to external stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <!-- super simple navbar at the top -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/">MI Predictor</a>
    </div>
  </nav>

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 col-sm-12">
        
        <!-- main heading -->
        <div class="text-center mb-4">
          <h1>MI Prediction Model</h1>
          <p class="text-muted">Enter the details below to predict Myocardial Infarction risk.</p>
        </div>

        <!-- if there's an error, we'll show a quick alert -->
        {% if error %}
          <div class="alert alert-danger" role="alert">
            {{ error }}
          </div>
        {% endif %}

        <!-- if the form was submitted, show results. otherwise, show the form -->
        {% if submitted %}
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title">Results</h3>
              <hr>
              <p><strong>MI Risk:</strong> {{ prediction }}</p>
              <p><strong>Probability of MI:</strong> {{ probability }}</p>
              <hr>
              <a href="/" class="btn btn-primary w-100">Try another input</a>
            </div>
          </div>
        {% else %}
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title">Patient Information</h3>
              <hr>

              <form method="POST">
                <!-- input for ca_0.0 -->
                <div class="mb-3">
                  <label for="ca_0_0" class="form-label">
                    Major vessels colored by fluoroscopy (ca_0.0)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="ca_0_0" 
                    id="ca_0_0" 
                    placeholder="e.g., 1.0" 
                    required
                  >
                </div>

                <!-- input for thal_7.0 -->
                <div class="mb-3">
                  <label for="thal_7_0" class="form-label">
                    Reversible Thalassemia defect (thal_7.0)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="thal_7_0" 
                    id="thal_7_0" 
                    placeholder="e.g., 0.0" 
                    required
                  >
                </div>

                <!-- input for cp_4.0 -->
                <div class="mb-3">
                  <label for="cp_4_0" class="form-label">
                    Chest pain type 4 (cp_4.0)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="cp_4_0" 
                    id="cp_4_0" 
                    placeholder="e.g., 0.0" 
                    required
                  >
                </div>

                <!-- input for asymptomatic_chest_pain -->
                <div class="mb-3">
                  <label for="asymptomatic_chest_pain" class="form-label">
                    Asymptomatic chest pain (asymptomatic_chest_pain)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="asymptomatic_chest_pain" 
                    id="asymptomatic_chest_pain" 
                    placeholder="e.g., 0.0" 
                    required
                  >
                </div>

                <!-- input for age_sex -->
                <div class="mb-3">
                  <label for="age_sex" class="form-label">
                    Age-sex interaction (age_sex)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="age_sex" 
                    id="age_sex" 
                    placeholder="e.g., 43" 
                    required
                  >
                </div>

                <!-- input for combined_risk_score -->
                <div class="mb-3">
                  <label for="combined_risk_score" class="form-label">
                    Combined risk score (combined_risk_score)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="combined_risk_score" 
                    id="combined_risk_score" 
                    placeholder="e.g., 2.5" 
                    required
                  >
                </div>

                <!-- input for oldpeak -->
                <div class="mb-3">
                  <label for="oldpeak" class="form-label">
                    St depression (oldpeak)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="oldpeak" 
                    id="oldpeak" 
                    placeholder="e.g., 1.2" 
                    required
                  >
                </div>

                <!-- input for thalach -->
                <div class="mb-3">
                  <label for="thalach" class="form-label">
                    Maximum heart rate (thalach)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="thalach" 
                    id="thalach" 
                    placeholder="e.g., 150.0" 
                    required
                  >
                </div>

                <!-- input for thalach_exang -->
                <div class="mb-3">
                  <label for="thalach_exang" class="form-label">
                    Hour x Exercise-induced Angina (thalach_exang)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="thalach_exang" 
                    id="thalach_exang" 
                    placeholder="e.g., 0.0" 
                    required
                  >
                </div>

                <!-- input for thal_3.0 -->
                <div class="mb-3">
                  <label for="thal_3_0" class="form-label">
                    Normal Thalassemia status (thal_3.0)
                  </label>
                  <input 
                    type="number" 
                    step="any" 
                    class="form-control" 
                    name="thal_3_0" 
                    id="thal_3_0" 
                    placeholder="e.g., 1.0" 
                    required
                  >
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Predict
                </button>
              </form>
            </div>
          </div>
        {% endif %}
      </div>
    </div>
  </div>

  <!-- using bootstrap js -->
  <script 
    src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
